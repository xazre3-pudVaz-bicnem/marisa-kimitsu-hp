name: Daily Blog Post Generation

on:
  schedule:
    # 毎日 10:30 JST (01:30 UTC)
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate daily blog post
        run: npx tsx scripts/generate-daily-post.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          if git diff --staged --quiet; then
            echo "変更なし（記事生成済みまたはスキップ）"
          else
            FILENAME=$(git diff --staged --name-only | head -1)
            git commit -m "自動生成: 日次ブログ記事を追加 [$(TZ=Asia/Tokyo date '+%Y-%m-%d')]"
            git push
            echo "✓ プッシュ完了: $FILENAME"
          fi
